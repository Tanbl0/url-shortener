name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install dependencies and run your tests
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # 4. Log in to Docker Hub using your GitHub Secrets
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build the Docker image and push it to Docker Hub!
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:latest

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
      # TODO: Add step to login to Docker Hub
      # Hint: You need to set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in repository secrets

      - name: Extract student ID and generate build time
        id: metadata
        run: |
          STUDENT_ID=$(cat student_id.txt)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "student_id=$STUDENT_ID" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Student ID: $STUDENT_ID"
          echo "Build Time: $BUILD_TIME"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:latest
          build-args: |
            BUILD_TIME=${{ steps.metadata.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
